extends: existence
message: "Avoid hedging '%s' — state the requirement directly using RFC 2119 keywords (MUST, SHOULD, MAY)."
level: warning
tokens:
  - might want to
  - consider using
  - it may be helpful
  - you could
  - you might
  - perhaps
  - arguably
  - it is recommended
  - it is suggested
  - it would be nice
  - ideally
  - in an ideal world
  - where possible
  - when feasible
  - if practical
